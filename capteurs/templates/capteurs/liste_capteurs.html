{% extends 'capteurs/base.html' %}
{% block contenu %}
<h1>Capteurs enregistrés</h1>

<p><a href="{% url 'donnees' %}">Voir toutes les données</a></p>

<table>
    <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Emplacement</th>
        <th>Actions</th>
    </tr>
    {% for c in capteurs %}
    <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.nom }}</td>
        <td>{{ c.emplacement }}</td>
        <td>
            <a class="btn" href="{% url 'capteur_detail' c.id %}">Détail</a>
            <a class="btn" href="{% url 'capteur_graphique' c.id %}">Graphique</a>
            <form method="post" action="{% url 'capteur_supprimer' c.id %}"
                  style="display:inline;"
                  onsubmit="return confirm('Supprimer le capteur « {{ c.nom }} » et toutes ses mesures ?');">
                {% csrf_token %}
                <button class="btn btn-danger" type="submit">Supprimer</button>
            </form>
        </td>
    </tr>
    {% empty %}
    <tr><td colspan="4">Aucun capteur enregistré.</td></tr>
    {% endfor %}
</table>
{% endblock %}
